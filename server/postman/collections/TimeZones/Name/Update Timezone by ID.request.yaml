$kind: http-request
name: Update Timezone by ID
url: http://localhost:3000/api/timezones/69bcd05093049e0d29f7bd5b
method: PUT
body:
  type: json
  content: |-
    {
      "fullName": "Pacific Standard Time"
    }
scripts:
  - type: afterResponse
    code: |-
      //TEST 1
      //main update test status
      pm.test("Status code is 200 (Updated OK)", function () {
          pm.response.to.have.status(200);
      });
      //TEST 2
      //make sure ID is one wanted to update so don't overwrite wrong one
      pm.test("Updated resource ID matches requested ID", function () {
          var jsonData = pm.response.json();
          var expectedId = pm.collectionVariables.get("id"); 
          pm.expect(jsonData.id).to.eql(expectedId);
      });
      //TEST 3
      //for ID that doesn't exist //FAIL IS PASS 
      pm.test("Status code is 404 for invalid ID", function () {
          pm.response.to.have.status(404);
      });
    language: text/javascript
order: 4472874390649173
